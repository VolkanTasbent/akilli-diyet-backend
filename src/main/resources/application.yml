spring:
  application:
    name: akilli-diyet-api
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:diyet;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${DATABASE_USER:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-long-random-string-at-least-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:}

logging:
  level:
    org.hibernate.SQL: warn

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/akilli_diyet
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
