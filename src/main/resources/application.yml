spring:
  application:
    name: akilli-diyet-api
  datasource:
    # Varsayılan: dosya tabanlı H2 (Docker Postgres değil). Konsolda birebir aynı JDBC kullan:
    # jdbc:h2:file:<USER_HOME>/.akilli-diyet/h2/diyet;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    # Gerçek Postgres için: docker compose up -d  ardından SPRING_PROFILES_ACTIVE=postgres
    # Tamamen geçici H2: DATABASE_URL=jdbc:h2:mem:diyet;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    url: ${DATABASE_URL:jdbc:h2:file:${user.home}/.akilli-diyet/h2/diyet;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE}
    username: ${DATABASE_USER:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-long-random-string-at-least-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    # Boş = geliştirme: http://localhost:* ve http://127.0.0.1:* (tüm portlar). Üretimde APP_CORS_ORIGINS zorunlu önerilir.
    allowed-origins: ${APP_CORS_ORIGINS:}
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:}
  reminder:
    email:
      # E-posta hatırlatmaları (Europe/Istanbul). SMTP yapılandırılmadıysa zamanlayıcı çalışmaz.
      water-interval-hours: ${REMINDER_EMAIL_WATER_INTERVAL_HOURS:2}
      breakfast-time: ${REMINDER_EMAIL_BREAKFAST_TIME:08:30}
      lunch-time: ${REMINDER_EMAIL_LUNCH_TIME:13:00}
      dinner-time: ${REMINDER_EMAIL_DINNER_TIME:19:30}

logging:
  level:
    org.hibernate.SQL: warn

---
# Lokal Postgres (pgAdmin vb.): akilli_diyet, kullanıcı postgres; şifre ortamına göre (varsayılan 1).
# Farklı şifre için: DB_PASSWORD=...   Docker ilk kurulumda compose ile aynı olmalı.
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:akilli_diyet}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:1}
    driver-class-name: org.postgresql.Driver
  h2:
    console:
      enabled: false
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
